<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes - Muralis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Gestão de Cliente</h2>
        <form id="clienteForm">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required placeholder="Ex: João da Silva">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" required placeholder="000.000.000-00" maxlength="14">
                </div>
                <div class="form-group">
                    <label for="dataNasc">Data de Nascimento</label>
                    <input type="date" id="dataNasc" required>
                </div>
            </div>

            <h3 style="margin: 1.5rem 0 1rem; font-size: 1.1rem; color: #4b5563;">Endereço</h3>

            <div class="form-row">
                <div class="form-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                </div>
                <div class="form-group">
                    <label for="estado">Estado (UF)</label>
                    <input type="text" id="estado" placeholder="Ex: SP">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" placeholder="Ex: São Paulo">
                </div>
                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" placeholder="Ex: Centro">
                </div>
            </div>

            <div class="form-group">
                <label for="logradouro">Logradouro (Rua/Avenida)</label>
                <input type="text" id="logradouro" placeholder="Ex: Rua das Flores">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="numero">Número</label>
                    <input type="text" id="numero" placeholder="Ex: 123">
                </div>
                <div class="form-group">
                    <label for="complemento">Complemento (Opcional)</label>
                    <input type="text" id="complemento" placeholder="Ex: Bloco B">
                </div>
            </div>

            <button type="submit">Salvar Cliente</button>
        </form>
    </div>

    <div class="card">
        <h2>Clientes Cadastrados</h2>

        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
            <input type="text" id="buscaInput" placeholder="Buscar por Nome ou CPF..." style="flex: 1;">
            <button type="button" onclick="buscarClientes()" style="width: auto; margin-top: 0; padding: 0.5rem 1rem;">Buscar</button>
            <button type="button" onclick="carregarClientes()" style="width: auto; margin-top: 0; padding: 0.5rem 1rem; background-color: #6b7280;">Limpar</button>
        </div>

        <div style="overflow-x: auto;">
            <table id="tabelaClientes">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Cidade</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody id="listaClientes">
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalContatos" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <h2 id="modalNomeCliente">Contatos do Cliente</h2>

        <form id="contatoForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="tipoContato">Tipo</label>
                    <select id="tipoContato" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 5px;">
                        <option value="">Selecione...</option>
                        <option value="Telefone">Telefone</option>
                        <option value="E-mail">E-mail</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="valorContato">Valor</label>
                    <input type="text" id="valorContato" required>
                </div>
            </div>
            <div class="form-group">
                <label for="obsContato">Observação (Opcional)</label>
                <input type="text" id="obsContato">
            </div>
            <button type="submit">Adicionar Contato</button>
        </form>

        <table style="margin-top: 2rem;">
            <thead>
            <tr>
                <th>Tipo</th>
                <th>Contato</th>
                <th>Obs</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody id="listaContatosModal">
            </tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
